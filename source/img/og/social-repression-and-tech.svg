<?xml version="1.0" encoding="UTF-8"?>
<!-- OG 封面 1200×630 · 社会性压抑和科技 · 暖米纸学术 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-s" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f2ece1"/>
      <stop offset="100%" stop-color="#e8dfcd"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-s)"/>

  <!-- 纸纹极淡水平线 -->
  <g stroke="#c9bfa6" stroke-opacity="0.25" stroke-width="0.5">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="440" x2="1200" y2="440"/>
  </g>

  <!-- Lucide · book-open · 文献整理感 -->
  <g transform="translate(170 195) scale(10)"
     fill="none" stroke="#3d4f42" stroke-width="0.22"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
  </g>

  <!-- 右侧文字 -->
  <g fill="#2c2a26"
     font-family="'PingFang SC','Microsoft YaHei UI','Helvetica Neue','Segoe UI',Arial,sans-serif">
    <text x="530" y="200"
          font-family="'SFMono-Regular','Menlo','Consolas',monospace"
          font-size="16" fill="#c57b3d" letter-spacing="4">THINKING · 思考</text>

    <text x="530" y="310" font-size="60" font-weight="600" letter-spacing="-1">当代社会性压抑和</text>
    <text x="530" y="382" font-size="60" font-weight="600" letter-spacing="-1">科技发展是否有联系</text>

    <text x="530" y="445" font-size="20" font-weight="400" fill="#6b655a" letter-spacing="0.5">
      一个技术外行的文献整理
    </text>
  </g>

  <line x1="110" y1="555" x2="1090" y2="555" stroke="#c9bfa6" stroke-width="1"/>
  <text x="110" y="590" font-size="18" fill="#2c2a26" font-weight="500"
        font-family="'PingFang SC','Segoe UI',sans-serif">Looks Blog</text>
  <text x="1090" y="590" text-anchor="end" font-size="16" fill="#8a8375"
        font-family="'SFMono-Regular','Menlo','Consolas',monospace">7788dev.github.io</text>
</svg>
