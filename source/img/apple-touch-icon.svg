<?xml version="1.0" encoding="UTF-8"?>
<!-- iOS 桌面图标源文件（180×180），SVG 便于后续高清输出 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%"   stop-color="#2a2a2d"/>
      <stop offset="60%"  stop-color="#161618"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </radialGradient>
  </defs>
  <!-- iOS 会自动做圆角遮罩，底部保留为方形即可 -->
  <rect width="180" height="180" fill="url(#bg)"/>
  <!-- L 字 -->
  <rect x="60" y="40" width="22" height="90" rx="10" fill="#ffffff"/>
  <rect x="60" y="112" width="66" height="22" rx="10" fill="#ffffff"/>
</svg>
