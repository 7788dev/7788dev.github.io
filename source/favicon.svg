<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 浏览器标签图标：小尺寸下要清晰，所以底色纯黑、L 字更粗、圆角更小 -->
  <rect width="64" height="64" rx="14" fill="#0a0a0b"/>
  <!-- L 的竖笔 -->
  <rect x="20" y="14" width="10" height="36" rx="3" fill="#ffffff"/>
  <!-- L 的横笔 -->
  <rect x="20" y="40" width="26" height="10" rx="3" fill="#ffffff"/>
</svg>
