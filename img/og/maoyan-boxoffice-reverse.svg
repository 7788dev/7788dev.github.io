<?xml version="1.0" encoding="UTF-8"?>
<!-- OG 封面 1200×630 · 猫眼票房逆向 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-m" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1b1410"/>
      <stop offset="100%" stop-color="#0c0705"/>
    </linearGradient>
    <linearGradient id="ticket-m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffcc33"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-m)"/>

  <!-- 背景代码纹 -->
  <g font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="13" fill="#332820" opacity="0.55">
    <text x="30"  y="80">GET /i/api/dashboard-ajax/movie?channelId=40009&amp;sVersion=2</text>
    <text x="40" y="120">signKey = md5("method=GET&amp;timeStamp=...&amp;key=A013F70D...")</text>
    <text x="30" y="560">mygsig.ms1 = md5("581409236#" + joined + "$" + ts)</text>
    <text x="40" y="590">&amp;#xe886;&amp;#xf16b;&amp;#xf23f;  -&gt;  woff.cmap  -&gt;  2 4 6</text>
  </g>

  <!-- 左侧：电影票 + 裂口（字体加密的隐喻） -->
  <g transform="translate(140 175)">
    <!-- 票身 -->
    <path d="M20 10 L290 10 Q300 10 300 20 L300 70 Q280 75 280 95 Q280 115 300 120 L300 270 Q300 280 290 280 L20 280 Q10 280 10 270 L10 120 Q30 115 30 95 Q30 75 10 70 L10 20 Q10 10 20 10 Z"
          fill="url(#ticket-m)" opacity="0.95"/>
    <!-- 票内分隔虚线 -->
    <line x1="155" y1="25" x2="155" y2="265" stroke="#1b1410" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="6 5"/>
    <!-- 左侧编号 -->
    <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" fill="#1b1410" fill-opacity="0.78">
      <text x="40"  y="60"  font-size="14" letter-spacing="1">NO. 40009</text>
      <text x="40"  y="150" font-size="42" font-weight="700">&#xe886;&#xf16b;</text>
      <text x="40"  y="200" font-size="18">亿</text>
      <text x="40"  y="250" font-size="12" opacity="0.7">mtsi-font</text>
    </g>
    <!-- 右侧票根数字（模糊的加密效果） -->
    <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" fill="#1b1410" fill-opacity="0.55">
      <text x="180" y="80"  font-size="16">x e886</text>
      <text x="180" y="110" font-size="16">x f16b</text>
      <text x="180" y="140" font-size="16">x f23f</text>
      <text x="180" y="170" font-size="16">x f05a</text>
      <text x="180" y="200" font-size="16">x ed8f</text>
      <text x="180" y="230" font-size="16">x eba2</text>
    </g>
  </g>

  <!-- 右侧：文字 -->
  <g font-family="'PingFang SC', 'Microsoft YaHei UI', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#eceff4">
    <g transform="translate(500 130)">
      <rect x="0" y="0" width="98" height="36" rx="18" fill="#ff7a00" fill-opacity="0.18" stroke="#ff7a00" stroke-opacity="0.5" stroke-width="1"/>
      <text x="49" y="24" text-anchor="middle" font-size="18" fill="#ffb347" letter-spacing="2">逆向</text>
    </g>

    <text x="500" y="270" font-size="72" font-weight="700" letter-spacing="-1">猫眼票房</text>
    <text x="500" y="360" font-size="72" font-weight="700" letter-spacing="-1" fill="#ffb347">专业版</text>
    <text x="500" y="450" font-size="72" font-weight="700" letter-spacing="-1">纯算逆向</text>

    <text x="500" y="505" font-family="'SFMono-Regular','Menlo','Consolas',monospace"
          font-size="18" fill="#8a7a66">signKey · mygsig · WuKong · woff</text>
  </g>

  <!-- 底部站名 -->
  <g font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace">
    <text x="110" y="580" font-size="20" fill="#d8dee9" font-weight="600" font-family="'PingFang SC','Segoe UI',sans-serif">Looks Blog</text>
    <text x="1090" y="580" text-anchor="end" font-size="18" fill="#6b5a46">7788dev.github.io</text>
  </g>
</svg>
