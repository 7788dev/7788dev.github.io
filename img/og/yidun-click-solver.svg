      <stop offset="100%" stop-color="#61ff9b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="15" fill="#6f86a8" opacity="0.35">
